[package]
name = "open-wearther-wizard"
version = "0.1.0"
edition = "2024"
authors = ["Arunkumar Mourougappane <amouroug@buffalo.edu>"]
description = "A simple and elegant desktop weather application written in Rust and GTK 4.\nProvides current weather, forecasts, and animated weather icons packaged with the app.\nDesigned to be lightweight, extensible, and easy to localize or re-skin for different platforms and icon sets."
homepage = "https://github.com/arunkumar-mourougappane/open-weather-wizard"
license = "MIT"
[dependencies]
env_logger = "0.11.8"
gtk = { version = "0.10.0", package = "gtk4" }
glib = "0.21.0"
gio = { version = "0.21.0", package = "gio" }
log = { version = "0.4.27", features = ["std"] }
reqwest = { version = "0.12.23", features = ["json"] }
gdk-pixbuf = "0.21.0"
rust-embed = { version = "8.7.2", features = ["compression"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.143"
tokio = { version = "1.47.1", features = ["full"] }
base64 = "0.22.1"
dirs = "6.0.0"
async-trait = "0.1.89"
anyhow = "1.0.100"

[dev-dependencies]
tokio-test = "0.4.3"
