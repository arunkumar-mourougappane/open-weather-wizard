name: CI

on:
  push:
    branches: [ "main", "*" ]
  pull_request:
    branches: [ "main", "*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Formatting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy (lint)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install iced/wgpu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build-matrix:
    name: Build and test (${{ matrix.os }}, ${{ matrix.build-type }})
    runs-on: ${{ matrix.os }}
    needs: clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-type: [debug, release]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.build-type }}

      - name: Install iced/wgpu build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev

      - name: Build
        run: |
          if [ "${{ matrix.build-type }}" = "release" ]; then
            cargo build --release --locked
          else
            cargo build
          fi
        shell: bash

      - name: Run unit tests
        if: matrix.build-type == 'debug'
        run: cargo test --locked --all

      - name: Resolve release binary path
        if: matrix.build-type == 'release'
        id: binary
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "path=target/release/open-weather-wizard.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/release/open-weather-wizard" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Upload release artifact
        if: matrix.build-type == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: open-weather-wizard-${{ matrix.os }}-release
          path: ${{ steps.binary.outputs.path }}
