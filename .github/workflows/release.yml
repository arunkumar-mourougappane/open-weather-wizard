name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install iced/wgpu build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev libdbus-1-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Run unit tests against the release binary
        run: cargo test --release --locked --all

      - name: Package binary
        id: package
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows)
              src="target/release/open-weather-wizard.exe"
              dest="open-weather-wizard-${{ github.ref_name }}-windows-x86_64.exe"
              ;;
            macOS)
              src="target/release/open-weather-wizard"
              dest="open-weather-wizard-${{ github.ref_name }}-macos-$(uname -m)"
              ;;
            Linux)
              src="target/release/open-weather-wizard"
              dest="open-weather-wizard-${{ github.ref_name }}-linux-$(uname -m)"
              ;;
          esac
          cp "$src" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-binary-${{ matrix.os }}
          path: ${{ steps.package.outputs.path }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build installable app package
        id: bundle
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) formats="nsis" ;;
            macOS)   formats="dmg" ;;
            Linux)   formats="deb" ;;
          esac
          cargo packager --release --formats "$formats"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-installer-${{ matrix.os }}
          path: |
            target/dist/*.dmg
            target/dist/*.deb
            target/dist/*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all release binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-binary-*
          path: dist
          merge-multiple: true

      - name: Download all installer packages
        uses: actions/download-artifact@v8
        with:
          pattern: release-installer-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            dist/*
